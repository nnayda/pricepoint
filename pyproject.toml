[project]
name = "pricepoint"
version = "0.1.0"
description = "Evaluating house prices"
authors = [
    { name = "Nathan Nayda", email = "ntnayda@example.com" }
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "bs4>=0.0.2",
    "directory-tree>=1.0.0",
    "geoalchemy2>=0.18.1",
    "geopandas>=1.1.2",
    "geopy>=2.4.1",
    "lxml>=6.0.2",
    "matplotlib>=3.10.8",
    "numpy>=2.4.1",
    "odsclient>=0.8.4",
    "pandas>=3.0.0",
    "psycopg2-binary>=2.9.11",
    "pyogrio>=0.12.1",
    "requests>=2.32.5",
    "seaborn>=0.13.2",
    "sqlalchemy>=2.0.46",
]

[tool.hatch.version]
source = "project"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "coverage>=7.13.3",
    "ipython>=9.10.0",
    "mypy>=1.19.1",
    "myst-nb>=1.3.0",
    "numpydoc>=1.10.0",
    "pydata-sphinx-theme>=0.16.1",
    "pytest>=9.0.2",
    "ruff>=0.15.0",
    "sphinx>=9.1.0",
    "sphinx-design>=0.7.0",
    "sphinx-immaterial>=0.13.8",
]

[tool.mypy]
strict = true

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["dist", ".venv", "build", "docs", "dev"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",  # pycodestyle warnings
  "F",   # pyflakes
  "B",   # bugbear
  "I",   # isort (import sorting)
  "UP",  # pyupgrade
  "C90", # mccabe complexity
  "N",   # pep8-naming
  "D",   # pydocstyle
  "C4",  # flake8-comprehensions
]
#ignore = [
#  "D100",  # Missing docstring in public module
#  "D104",  # Missing docstring in public package
#]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ["pricepoint"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.semantic_release]
version_toml = [
    "pyproject.toml:project.version",
]
commit_author = "CI Bot <ci@example.com>"
commit_message = "chore(release): {version}"

[tool.semantic_release.branches.main]
match = "main"

[tool.semantic_release.branches.dev]
match = "dev"
prerelease = true
prerelease_token = "dev"

[tool.semantic_release.changelog]
output_format = "md"
exclude_commit_patterns = [
    '''chore(?:\([^)]*?\))?: .+''',
    '''ci(?:\([^)]*?\))?: .+''',
    '''refactor(?:\([^)]*?\))?: .+''',
    '''style(?:\([^)]*?\))?: .+''',
    '''test(?:\([^)]*?\))?: .+''',
    '''build\((?!deps\): .+)''',
    '''Initial [Cc]ommit.*''',
]

[tool.semantic_release.remote]
type = "gitlab"
domain = "gitlab.example.com"

[tool.semantic_release.publish]
upload_to_vcs_release = false
