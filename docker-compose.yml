services:
  # ---------------------------------------------------------------------------
  # Always-on application services (no profile required)
  # ---------------------------------------------------------------------------

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/pricepoint}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    depends_on: []
    networks:
      - pricepoint

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    networks:
      - pricepoint

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    ports:
      - "5001:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=${MLFLOW_BACKEND_STORE_URI:-sqlite:///mlflow.db}
      - MLFLOW_ARTIFACT_ROOT=${MLFLOW_ARTIFACT_ROOT:-s3://mlflow-artifacts}
      - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${S3_SECRET_KEY:-minioadmin}
      - MLFLOW_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    networks:
      - pricepoint

  # ---------------------------------------------------------------------------
  # Optional infrastructure (use with: docker compose --profile infra up)
  # Core infrastructure: postgres, minio, valkey
  # Airflow infrastructure: add --profile airflow for bundled Airflow + database
  # ---------------------------------------------------------------------------

  valkey:
    image: valkey/valkey:8-alpine
    profiles: [infra]
    ports:
      - "6379:6379"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pricepoint

  postgres:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    profiles: [infra]
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pricepoint

  postgres-init:
    image: postgis/postgis:17-3.5
    profiles: [infra]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGPASSWORD=postgres
    entrypoint: >
      /bin/bash -c "
      psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'pricepoint'\" | grep -q 1 || psql -h postgres -U postgres -c 'CREATE DATABASE pricepoint';
      psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'airflow'\" | grep -q 1 || psql -h postgres -U postgres -c 'CREATE DATABASE airflow';
      echo 'Databases created successfully'
      "
    networks:
      - pricepoint

  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: [infra]
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGADMIN_SERVER_JSON_FILE=/pgadmin4/servers.json
    volumes:
      - pgadmindata:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgpass:ro
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    networks:
      - pricepoint
    entrypoint: >
      /bin/sh -c "
      chmod 600 /pgpass;
      /entrypoint.sh
      "

  minio:
    image: minio/minio
    profiles: [infra]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    networks:
      - pricepoint

  minio-init:
    image: minio/mc
    profiles: [infra]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/pricepoint-data;
      mc mb --ignore-existing local/mlflow-artifacts;
      exit 0;
      "
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    networks:
      - pricepoint

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    profiles: [airflow]
    entrypoint: >
      /bin/bash -c "
      airflow db migrate &&
      (airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true) &&
      airflow dags reserialize
      "
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:-postgresql://postgres:postgres@postgres:5432/airflow}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    networks:
      - pricepoint

  airflow-api-server:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    profiles: [airflow]
    ports:
      - "8080:8080"
    command: airflow api-server
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:-postgresql://postgres:postgres@postgres:5432/airflow}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      - AIRFLOW__API__EXPOSE_CONFIG=true
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - pricepoint

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    profiles: [airflow]
    command: airflow scheduler
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:-postgresql://postgres:postgres@postgres:5432/airflow}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - pricepoint

volumes:
  pgdata:
  pgadmindata:
  miniodata:
  valkeydata:

networks:
  pricepoint:
    driver: bridge
