version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: chore

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: chore

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
