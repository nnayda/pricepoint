name: Bug report
description: Something doesn't work the way it should
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. make up-infra
        2. Open http://localhost:5173 and search for ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API (FastAPI)
        - Frontend (React)
        - ML pipeline / models
        - Data collectors
        - Airflow DAGs
        - Database / migrations
        - Helm / deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
