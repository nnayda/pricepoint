name: Release Please

# Maintains a release PR from Conventional Commits on main. Merging that PR
# creates the GitHub Release + tag, then the publish workflow is invoked
# directly (tags created with GITHUB_TOKEN do not trigger tag-push workflows).
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish images and chart
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: read
      packages: write
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
