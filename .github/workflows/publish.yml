name: Publish

# Builds the four service images and the Helm chart for a release tag and
# publishes them to GitHub Container Registry:
#   ghcr.io/nnayda/pricepoint/{api,frontend,mlflow,airflow}:<version>
#   oci://ghcr.io/nnayda/pricepoint/charts/pricepoint:<version>
#
# Invoked by release-please after a release is cut, by pushing a v* tag
# manually, or on demand via workflow_dispatch.
on:
  push:
    tags: ["v*"]
  workflow_call:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.2.3)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  images:
    name: Image (${{ matrix.component }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [api, frontend, mlflow, airflow]
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          persist-credentials: false

      - name: Compute version
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/${{ matrix.component }}.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pricepoint/${{ matrix.component }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/pricepoint/${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  scan:
    name: Trivy scan (${{ matrix.component }})
    needs: images
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        component: [api, frontend, mlflow, airflow]
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Compute version
        id: version
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/pricepoint/${{ matrix.component }}:${{ steps.version.outputs.version }}
          severity: CRITICAL,HIGH
          exit-code: "1"

  helm-chart:
    name: Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          persist-credentials: false

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Package and push chart
        run: |
          VERSION="${TAG#v}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm package helm/pricepoint/ --version "$VERSION" --app-version "$VERSION"
          helm push "pricepoint-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/pricepoint/charts"
