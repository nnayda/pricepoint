apiVersion: v2
name: pricepoint
description: A Helm chart for deploying the PricePoint application
type: application
version: 0.2.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: 16.7.27
    repository: file://charts
    condition: postgresql.enabled
  - name: minio
    version: 14.10.5
    repository: file://charts
    condition: minio.enabled
  - name: valkey
    version: 2.4.7
    repository: file://charts
    condition: valkey.subchart.enabled
  - name: airflow
    version: 1.18.0
    repository: file://charts
    condition: airflow.subchart.enabled
