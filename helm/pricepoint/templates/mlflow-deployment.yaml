apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pricepoint.fullname" . }}-mlflow
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  replicas: {{ .Values.mlflow.replicaCount }}
  selector:
    matchLabels:
      {{- include "pricepoint.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mlflow
  template:
    metadata:
      labels:
        {{- include "pricepoint.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mlflow
    spec:
      containers:
        - name: mlflow
          image: "{{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag | default .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.mlflow.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mlflow.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "pricepoint.fullname" . }}-app-config
            - secretRef:
                name: {{ include "pricepoint.fullname" . }}-secret
          env:
            - name: MLFLOW_SERVER_DISABLE_SECURITY_MIDDLEWARE
              value: "true"
          command: ["mlflow"]
          args:
            - "server"
            - "--host=0.0.0.0"
            - "--port={{ .Values.mlflow.service.port }}"
            - "--default-artifact-root={{ .Values.config.mlflowArtifactRoot }}"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlflow.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.mlflow.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.mlflow.resources | nindent 12 }}
