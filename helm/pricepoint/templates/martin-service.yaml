{{- if .Values.martin.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pricepoint.fullname" . }}-martin
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
    app.kubernetes.io/component: martin
spec:
  type: {{ .Values.martin.service.type }}
  ports:
    - port: {{ .Values.martin.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "pricepoint.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: martin
{{- end }}
