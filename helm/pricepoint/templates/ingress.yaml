{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pricepoint.fullname" . }}
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - secretName: {{ .secretName }}
      hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          {{- if eq .service "martin" }}
          {{- if $.Values.martin.enabled }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "pricepoint.fullname" $ }}-{{ .service }}
                port:
                  number: {{ .port }}
          {{- end }}
          {{- else if eq .service "airflow" }}
          {{- if $.Values.airflow.enabled }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "pricepoint.fullname" $ }}-{{ .service }}
                port:
                  number: {{ .port }}
          {{- end }}
          {{- else }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "pricepoint.fullname" $ }}-{{ .service }}
                port:
                  number: {{ .port }}
          {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
