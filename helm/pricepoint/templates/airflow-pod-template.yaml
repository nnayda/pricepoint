{{- if and .Values.airflow.enabled (eq (.Values.airflow.executor | default "LocalExecutor") "KubernetesExecutor") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pricepoint.fullname" . }}-airflow-pod-template
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
    app.kubernetes.io/component: airflow
data:
  pod-template.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: placeholder
      labels:
        app.kubernetes.io/name: {{ include "pricepoint.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: airflow-worker
    spec:
      securityContext:
        fsGroup: {{ .Values.airflow.redfin.fsGroup }}
        fsGroupChangePolicy: OnRootMismatch
      serviceAccountName: {{ include "pricepoint.fullname" . }}-airflow
      containers:
        - name: base
          image: "{{ .Values.airflow.image.repository }}:{{ .Values.airflow.image.tag }}"
          imagePullPolicy: {{ .Values.airflow.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "pricepoint.fullname" . }}-app-config
            - secretRef:
                name: {{ include "pricepoint.fullname" . }}-secret
          volumeMounts:
            - name: airflow-logs
              mountPath: /opt/airflow/logs
            - name: airflow-dags
              mountPath: /opt/airflow/dags
            - name: redfin-data
              mountPath: /opt/airflow/redfin-data
          resources:
            {{- toYaml .Values.airflow.scheduler.resources | nindent 12 }}
      initContainers:
        - name: fix-redfin-perms
          image: busybox:1.37
          command: ["sh", "-c", "chown :{{ .Values.airflow.redfin.fsGroup }} /opt/airflow/redfin-data && chmod 2777 /opt/airflow/redfin-data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: redfin-data
              mountPath: /opt/airflow/redfin-data
      {{- if .Values.airflow.dagSync.enabled }}
        - name: git-sync-init
          image: "{{ .Values.airflow.dagSync.image.repository }}:{{ .Values.airflow.dagSync.image.tag }}"
          env:
            - name: GITSYNC_REPO
              value: {{ .Values.airflow.dagSync.repo | quote }}
            - name: GITSYNC_REF
              value: {{ .Values.airflow.dagSync.branch | quote }}
            - name: GITSYNC_ROOT
              value: /git
            - name: GITSYNC_LINK
              value: /opt/airflow/dags
            - name: GITSYNC_SUBPATH
              value: {{ .Values.airflow.dagSync.subPath | quote }}
            - name: GITSYNC_ONE_TIME
              value: "true"
            {{- if and .Values.airflow.dagSync.credentials .Values.airflow.dagSync.credentials.username }}
            - name: GITSYNC_USERNAME
              value: {{ .Values.airflow.dagSync.credentials.username | quote }}
            - name: GITSYNC_PASSWORD
              value: {{ .Values.airflow.dagSync.credentials.password | quote }}
            {{- end }}
          volumeMounts:
            - name: airflow-dags
              mountPath: /opt/airflow/dags
          resources:
            {{- toYaml .Values.airflow.dagSync.resources | nindent 12 }}
      {{- end }}
      volumes:
        - name: airflow-logs
          persistentVolumeClaim:
            claimName: {{ include "pricepoint.fullname" . }}-airflow-logs
        - name: airflow-dags
          emptyDir: {}
        - name: redfin-data
          persistentVolumeClaim:
            claimName: {{ include "pricepoint.fullname" . }}-airflow-redfin
      restartPolicy: Never
{{- end }}
