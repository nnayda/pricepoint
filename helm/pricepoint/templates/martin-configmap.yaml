{{- if .Values.martin.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pricepoint.fullname" . }}-martin-config
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
    app.kubernetes.io/component: martin
data:
  config.yaml: |
    listen_addresses: '0.0.0.0:3000'
    postgres:
      - connection_string: ${DATABASE_URL}
        default_srid: 4326
        auto_bounds: skip
        tables:
          greenspaces:
            schema: public
            table: greenspaces
            geometry_column: geom
            srid: 4326
            geometry_type: MULTIPOLYGON
          trails:
            schema: public
            table: trails
            geometry_column: geom
            srid: 4326
            geometry_type: MULTILINESTRING
          noises:
            schema: public
            table: noises
            geometry_column: geom
            srid: 4326
            geometry_type: MULTIPOLYGON
          risk_boundaries:
            schema: public
            table: risk_boundaries
            geometry_column: geom
            srid: 4326
            geometry_type: GEOMETRY
          school_districts:
            schema: public
            table: school_districts
            geometry_column: geom
            srid: 4326
            geometry_type: MULTIPOLYGON
          v_infrastructure:
            schema: public
            table: v_infrastructure
            geometry_column: geom
            srid: 4326
            geometry_type: GEOMETRY
          v_block_group_demographics:
            schema: public
            table: v_block_group_demographics
            geometry_column: geom
            srid: 4326
            geometry_type: MULTIPOLYGON
          v_block_group_labels:
            schema: public
            table: v_block_group_labels
            geometry_column: geom
            srid: 4326
            geometry_type: GEOMETRY
          v_county_demographics:
            schema: public
            table: v_county_demographics
            geometry_column: geom
            srid: 4326
            geometry_type: MULTIPOLYGON
          v_county_labels:
            schema: public
            table: v_county_labels
            geometry_column: geom
            srid: 4326
            geometry_type: GEOMETRY
          v_subdivision_demographics:
            schema: public
            table: v_subdivision_demographics
            geometry_column: geom
            srid: 4326
            geometry_type: MULTIPOLYGON
          v_subdivision_labels:
            schema: public
            table: v_subdivision_labels
            geometry_column: geom
            srid: 4326
            geometry_type: GEOMETRY
          v_township_demographics:
            schema: public
            table: v_township_demographics
            geometry_column: geom
            srid: 4326
            geometry_type: MULTIPOLYGON
          v_township_labels:
            schema: public
            table: v_township_labels
            geometry_column: geom
            srid: 4326
            geometry_type: GEOMETRY
          v_tract_demographics:
            schema: public
            table: v_tract_demographics
            geometry_column: geom
            srid: 4326
            geometry_type: MULTIPOLYGON
          v_tract_labels:
            schema: public
            table: v_tract_labels
            geometry_column: geom
            srid: 4326
            geometry_type: GEOMETRY
{{- end }}
