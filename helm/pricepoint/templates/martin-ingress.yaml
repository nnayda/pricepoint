{{- if and .Values.ingress.enabled .Values.martin.enabled -}}
{{- if hasPrefix "traefik" (.Values.ingress.className | default "") }}
{{- /*
  Traefik: Use IngressRoute CRD with StripPrefix middleware.
  Standard Ingress is kept as a fallback — if Traefik does not watch
  this namespace for IngressRoute CRDs, the standard Ingress will
  still route /tiles to Martin (Martin handles the /tiles prefix
  internally via redirect).
*/}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "pricepoint.fullname" . }}-martin-tiles
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
    app.kubernetes.io/component: martin
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ (index .Values.ingress.hosts 0).host }}`) && PathPrefix(`/tiles`)
      kind: Rule
      middlewares:
        - name: {{ include "pricepoint.fullname" . }}-strip-tiles
        - name: {{ include "pricepoint.fullname" . }}-tile-headers
      services:
        - name: {{ include "pricepoint.fullname" . }}-martin
          port: {{ .Values.martin.service.port }}
  {{- if .Values.ingress.tls }}
  tls:
    secretName: {{ (index .Values.ingress.tls 0).secretName }}
  {{- end }}
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pricepoint.fullname" . }}-martin-tiles-fallback
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
    app.kubernetes.io/component: martin
  annotations:
    {{- if hasPrefix "traefik" (.Values.ingress.className | default "") }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ include "pricepoint.fullname" . }}-strip-tiles@kubernetescrd,{{ .Release.Namespace }}-{{ include "pricepoint.fullname" . }}-tile-headers@kubernetescrd
    {{- end }}
    {{- if hasPrefix "nginx" (.Values.ingress.className | default "") }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - secretName: {{ .secretName }}
      hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- if hasPrefix "nginx" ($.Values.ingress.className | default "") }}
          - path: /tiles/(.*)
          {{- else }}
          - path: /tiles
          {{- end }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "pricepoint.fullname" $ }}-martin
                port:
                  number: {{ $.Values.martin.service.port }}
    {{- end }}
{{- end }}
