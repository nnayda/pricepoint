apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pricepoint.fullname" . }}-secret
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ include "pricepoint.databaseUrl" . | b64enc }}
  S3_ACCESS_KEY: {{ include "pricepoint.s3AccessKey" . | b64enc }}
  S3_SECRET_KEY: {{ include "pricepoint.s3SecretKey" . | b64enc }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | b64enc }}
  FRED_API_KEY: {{ .Values.secrets.fredApiKey | b64enc }}
  OAUTH_GOOGLE_CLIENT_SECRET: {{ .Values.secrets.oauthGoogleClientSecret | b64enc }}
  {{- if .Values.secrets.censusApiKey }}
  CENSUS_API_KEY: {{ .Values.secrets.censusApiKey | b64enc }}
  {{- end }}
  {{- if .Values.secrets.mlflowBackendStoreUri }}
  MLFLOW_BACKEND_STORE_URI: {{ .Values.secrets.mlflowBackendStoreUri | b64enc }}
  {{- end }}
  {{- if .Values.airflow.enabled }}
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: {{ include "pricepoint.airflowDatabaseUrl" . | b64enc }}
  {{- if .Values.secrets.airflowWebserverSecretKey }}
  AIRFLOW__WEBSERVER__SECRET_KEY: {{ .Values.secrets.airflowWebserverSecretKey | b64enc }}
  {{- end }}
  {{- if .Values.secrets.airflowJwtSecret }}
  AIRFLOW__API_AUTH__JWT_SECRET: {{ .Values.secrets.airflowJwtSecret | b64enc }}
  {{- end }}
  AIRFLOW_PASSWORD: {{ .Values.secrets.airflowPassword | b64enc }}
  {{- end }}
