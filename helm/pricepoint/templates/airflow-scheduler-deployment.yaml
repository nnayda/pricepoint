{{- if .Values.airflow.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pricepoint.fullname" . }}-airflow-scheduler
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
    app.kubernetes.io/component: airflow-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pricepoint.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: airflow-scheduler
  template:
    metadata:
      labels:
        {{- include "pricepoint.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: airflow-scheduler
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        fsGroup: {{ .Values.airflow.redfin.fsGroup }}
        fsGroupChangePolicy: OnRootMismatch
      {{- if eq (.Values.airflow.executor | default "LocalExecutor") "KubernetesExecutor" }}
      serviceAccountName: {{ include "pricepoint.fullname" . }}-airflow
      {{- end }}
      initContainers:
        - name: fix-redfin-perms
          image: busybox:1.37
          command: ["sh", "-c", "chown :{{ .Values.airflow.redfin.fsGroup }} /opt/airflow/redfin-data && chmod 2777 /opt/airflow/redfin-data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: redfin-data
              mountPath: /opt/airflow/redfin-data
      containers:
        - name: scheduler
          image: "{{ .Values.airflow.image.repository }}:{{ .Values.airflow.image.tag }}"
          args: ["scheduler"]
          env:
            - name: AIRFLOW__API_SERVER__API_URL
              value: "http://{{ include "pricepoint.fullname" . }}-airflow:{{ include "pricepoint.airflowPort" . }}"
            - name: AIRFLOW__CORE__EXECUTION_API_SERVER_URL
              value: "http://{{ include "pricepoint.fullname" . }}-airflow:{{ include "pricepoint.airflowPort" . }}/execution/"
            - name: AIRFLOW__LOGGING__WORKER_LOG_SERVER_HOST
              value: "{{ include "pricepoint.fullname" . }}-airflow-scheduler"
            {{- if eq (.Values.airflow.executor | default "LocalExecutor") "KubernetesExecutor" }}
            - name: AIRFLOW__KUBERNETES_EXECUTOR__POD_TEMPLATE_FILE
              value: /opt/airflow/pod-template/pod-template.yaml
            - name: AIRFLOW__KUBERNETES_EXECUTOR__NAMESPACE
              value: {{ .Release.Namespace | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "pricepoint.fullname" . }}-app-config
            - secretRef:
                name: {{ include "pricepoint.fullname" . }}-secret
          volumeMounts:
            - name: airflow-logs
              mountPath: /opt/airflow/logs
            {{- if .Values.airflow.dagSync.enabled }}
            - name: airflow-dags
              mountPath: /opt/airflow/dags
            {{- end }}
            - name: redfin-data
              mountPath: /opt/airflow/redfin-data
            {{- if eq (.Values.airflow.executor | default "LocalExecutor") "KubernetesExecutor" }}
            - name: pod-template
              mountPath: /opt/airflow/pod-template
            {{- end }}
          resources:
            {{- toYaml .Values.airflow.scheduler.resources | nindent 12 }}
        {{- if .Values.airflow.dagSync.enabled }}
        - name: git-sync
          image: "{{ .Values.airflow.dagSync.image.repository }}:{{ .Values.airflow.dagSync.image.tag }}"
          env:
            - name: GITSYNC_REPO
              value: {{ .Values.airflow.dagSync.repo | quote }}
            - name: GITSYNC_REF
              value: {{ .Values.airflow.dagSync.branch | quote }}
            - name: GITSYNC_ROOT
              value: /git
            - name: GITSYNC_LINK
              value: /opt/airflow/dags
            - name: GITSYNC_SUBPATH
              value: {{ .Values.airflow.dagSync.subPath | quote }}
            - name: GITSYNC_PERIOD
              value: "60s"
            {{- if and .Values.airflow.dagSync.credentials .Values.airflow.dagSync.credentials.username }}
            - name: GITSYNC_USERNAME
              value: {{ .Values.airflow.dagSync.credentials.username | quote }}
            - name: GITSYNC_PASSWORD
              value: {{ .Values.airflow.dagSync.credentials.password | quote }}
            {{- end }}
          volumeMounts:
            - name: airflow-dags
              mountPath: /opt/airflow/dags
          resources:
            {{- toYaml .Values.airflow.dagSync.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: airflow-logs
          emptyDir: {}
        {{- if .Values.airflow.dagSync.enabled }}
        - name: airflow-dags
          emptyDir: {}
        {{- end }}
        - name: redfin-data
          persistentVolumeClaim:
            claimName: {{ include "pricepoint.fullname" . }}-airflow-redfin
        {{- if eq (.Values.airflow.executor | default "LocalExecutor") "KubernetesExecutor" }}
        - name: pod-template
          configMap:
            name: {{ include "pricepoint.fullname" . }}-airflow-pod-template
        {{- end }}
{{- end }}
