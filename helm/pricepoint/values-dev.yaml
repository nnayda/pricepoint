# Dev environment overrides

api:
  replicaCount: 1
  image:
    tag: dev

frontend:
  replicaCount: 1
  image:
    tag: dev

mlflow:
  replicaCount: 1
  image:
    tag: dev

config:
  devMode: "true"
  logLevel: "DEBUG"

ingress:
  hosts:
    - host: pricepoint-dev.local
      paths:
        - path: /api
          service: api
          port: 8000
        - path: /health
          service: api
          port: 8000
        - path: /ready
          service: api
          port: 8000
        - path: /tiles
          service: martin
          port: 3000
        - path: /mlflow
          service: mlflow
          port: 5000
        - path: /
          service: frontend
          port: 80

postgresql:
  enabled: true
  storage:
    size: 5Gi

minio:
  enabled: true
  storage:
    size: 10Gi

valkey:
  enabled: true

airflow:
  enabled: true

# Dev uses external OSRM/Photon
osrm:
  enabled: false

photon:
  enabled: false
