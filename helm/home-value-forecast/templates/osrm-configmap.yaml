{{- if .Values.osrm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pricepoint.fullname" . }}-osrm-nginx
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
    app.kubernetes.io/component: osrm
data:
  default.conf: |
    server {
      listen 8080;

      location /route/v1/driving/ {
        proxy_pass http://127.0.0.1:5000;
      }
      location /nearest/v1/driving/ {
        proxy_pass http://127.0.0.1:5000;
      }
      location /table/v1/driving/ {
        proxy_pass http://127.0.0.1:5000;
      }
      location /route/v1/walking/ {
        proxy_pass http://127.0.0.1:5001;
      }
      location /nearest/v1/walking/ {
        proxy_pass http://127.0.0.1:5001;
      }
      location /table/v1/walking/ {
        proxy_pass http://127.0.0.1:5001;
      }

      location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
      }
    }
{{- end }}
