apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pricepoint.fullname" . }}-mlflow
  labels:
    {{- include "pricepoint.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
spec:
  replicas: {{ .Values.mlflow.replicaCount }}
  selector:
    matchLabels:
      {{- include "pricepoint.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mlflow
  template:
    metadata:
      labels:
        {{- include "pricepoint.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mlflow
    spec:
      containers:
        - name: mlflow
          image: "{{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag }}"
          imagePullPolicy: {{ .Values.mlflow.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mlflow.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "pricepoint.fullname" . }}-config
            - secretRef:
                name: {{ include "pricepoint.fullname" . }}-secret
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.mlflow.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.mlflow.resources | nindent 12 }}
