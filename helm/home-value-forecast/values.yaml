# Default values for pricepoint

# -- API service ---------------------------------------------------------------
api:
  replicaCount: 1
  image:
    repository: pricepoint/api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Frontend service ----------------------------------------------------------
frontend:
  replicaCount: 1
  image:
    repository: pricepoint/frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- MLflow service ------------------------------------------------------------
mlflow:
  replicaCount: 1
  image:
    repository: pricepoint/mlflow
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Ingress -------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: pricepoint.local
      paths:
        - path: /api
          service: api
          port: 8000
        - path: /health
          service: api
          port: 8000
        - path: /ready
          service: api
          port: 8000
        - path: /mlflow
          service: mlflow
          port: 5000
        - path: /
          service: frontend
          port: 80

# -- PostgreSQL (optional, bundled) --------------------------------------------
postgresql:
  enabled: true
  image:
    repository: postgis/postgis
    tag: "16-3.4"
  auth:
    username: pricepoint
    password: pricepoint
    database: pricepoint
  storage:
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# External database (used when postgresql.enabled=false)
externalDatabase:
  url: ""

# -- MinIO (optional, bundled) -------------------------------------------------
minio:
  enabled: true
  image:
    repository: minio/minio
    tag: latest
  auth:
    rootUser: minioadmin
    rootPassword: minioadmin
  defaultBuckets: "pricepoint-data,mlflow-artifacts"
  storage:
    size: 20Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# External S3 (used when minio.enabled=false)
externalS3:
  endpoint: ""
  accessKey: ""
  secretKey: ""
  bucket: ""

# -- Airflow (optional, bundled) -----------------------------------------------
airflow:
  enabled: true
  image:
    repository: apache/airflow
    tag: "2.9-python3.12"
  webserver:
    service:
      type: ClusterIP
      port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
