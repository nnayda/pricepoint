# Production environment overrides — use external infrastructure

api:
  replicaCount: 3
  image:
    tag: stable
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

frontend:
  replicaCount: 2
  image:
    tag: stable
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

mlflow:
  replicaCount: 1
  image:
    tag: stable

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: pricepoint.example.com
      paths:
        - path: /api
          service: api
          port: 8000
        - path: /health
          service: api
          port: 8000
        - path: /ready
          service: api
          port: 8000
        - path: /mlflow
          service: mlflow
          port: 5000
        - path: /
          service: frontend
          port: 80
  tls:
    - secretName: pricepoint-tls
      hosts:
        - pricepoint.example.com

# Disable all bundled infra in production — use external services
postgresql:
  enabled: false

externalDatabase:
  url: "postgresql://pricepoint:CHANGEME@prod-postgres.example.com:5432/pricepoint"
  airflowUrl: "postgresql://airflow:CHANGEME@prod-postgres.example.com:5432/airflow"

pgbouncer:
  enabled: false

minio:
  enabled: false

externalS3:
  endpoint: "https://s3.example.com"
  accessKey: "CHANGEME"
  secretKey: "CHANGEME"
  bucket: "pricepoint-data"

valkey:
  enabled: false

externalValkey:
  url: "redis://prod-valkey.example.com:6379/0"

osrm:
  enabled: false

externalOsrm:
  baseUrl: "http://osrm.example.com"

photon:
  enabled: false

externalGeocode:
  provider: photon
  url: "http://photon.example.com/api"

airflow:
  enabled: false

externalAirflow:
  baseUrl: "http://airflow.example.com"

podDisruptionBudget:
  enabled: true

monitoring:
  serviceMonitor:
    enabled: true
  prometheusRules:
    enabled: true
